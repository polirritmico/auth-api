# App
spring.application.name=${SPRING_APP_NAME}
server.port=8080
spring.log.level=${SPRING_LOG_LEVEL:INFO}
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Security
jwt.secret=${SPRING_JWT_SECRET}
jwt.issuer=${SPRING_JWT_ISSUER}
jwt.public=${SPRING_JWT_PUBLIC}
jwt.expiration=${SPRING_JWT_EXPIRATION}

# MySQL
spring.datasource.url=jdbc:mysql://${MYSQL_HOST}:3306/${MYSQL_DATABASE}
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=30000

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migrations
spring.flyway.baseline-on-migrate=true
spring.flyway.clean-disabled=true
spring.flyway.clean-on-validation-error=false

# OpenAPI / Swagger
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=false
